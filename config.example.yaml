# Configuration de backup-monitor — copier vers config.yaml.
# Méthode « outlook » (recommandée sur le poste Windows 11) : AUCUN mot de
# passe nécessaire, l'outil lit directement le Outlook local, en lecture seule.

exchange:
  # Méthode d'accès :
  #   outlook = lit le Outlook installé sur ce poste (Windows, recommandé)
  #   ews / imap = accès serveur direct (voir requirements-exchange.txt)
  method: outlook
  # --- Champs ci-dessous requis SEULEMENT pour ews/imap ---
  email: ""
  username: ""
  auth: ntlm
  ews_url: ""
  verify_ssl: true

outlook:
  # Nom du magasin (la boîte) tel qu'affiché dans le volet Outlook, ex.
  # "backups@exemple.local". Laisser vide = boîte par défaut du profil.
  store: ""

# Cache local de collecte (mode Outlook) — relire tous les corps de courriels
# via Outlook à chaque cycle est le principal poste de coût : avec le cache,
# seuls les courriels JAMAIS VUS sont lus en entier, les autres sont reconnus
# à leur identifiant. Le fichier vit dans le profil du POSTE
# (%LOCALAPPDATA%\backup-monitor sous Windows) — jamais sur la clé USB — et
# contient sujet/expéditeur/corps des courriels de la fenêtre d'analyse :
# mettre enabled: false si même cela est trop sensible (le fichier existant
# est alors supprimé au prochain lancement). Un courriel supprimé/déplacé
# sort du cache au cycle suivant ; changer la section attachments le vide ;
# le supprimer à la main est toujours sans risque (il se reconstruit).
cache:
  enabled: true
  dir: ""   # vide = emplacement par défaut du poste ; sinon dossier au choix

imap:
  server: ""
  port: 993
  ssl: true

# Dossiers Outlook à analyser (chemins séparés par « / »).
# Laisser vide et lancer « python -m backup_monitor setup » : l'outil scanne
# les boîtes/dossiers disponibles et vous fait choisir interactivement.
# La boîte n'est JAMAIS modifiée : lecture seule, les courriels restent non lus.
folders:
  macrium: []
  retrospect: []
  # Exemple de saisie manuelle :
  # macrium:
  #   - "Boîte de réception/Backups/Macrium"

# Mode « un client par sous-dossier » (idéal pour une arborescence
# Sauvegardes/<Client>) : indiquez le(s) dossier(s) PARENT ci-dessous. Chaque
# sous-dossier devient un client (son nom repris tel quel), et le produit
# (Macrium/Retrospect) est détecté automatiquement dans le contenu — les
# dossiers à produits mixtes ne posent donc pas problème. Ajouter un client =
# créer un sous-dossier dans Outlook, sans modifier ce fichier. Se combine avec
# « folders » au besoin. (Mode Outlook.)
client_folders: []
#  - "Boîte de réception/Sauvegardes"

analysis:
  # Fenêtre d'analyse : nombre de jours de courriels relus à chaque exécution
  days_back: 14
  timezone: America/Toronto

# Lecture des pièces jointes — DÉSACTIVÉE par défaut. Sécurité multicouche :
# jamais exécutées, jamais ouvertes par une application, jamais rendues,
# uniquement si TOUTES ces conditions sont réunies :
#   - expéditeur dans allowed_senders (adresse exacte, ou "@domaine.local") ;
#   - extension dans allowed_extensions ;
#   - taille <= max_kb ;
#   - contenu conforme (binaire déguisé en .txt/.html rejeté ; un .pdf doit
#     réellement commencer par %PDF).
# Traitement par type : texte lu tel quel ; HTML réduit à son texte (scripts
# et balises supprimés, jamais rendu) ; PDF : texte extrait par pypdf dans un
# sous-processus à délai maximal (jamais ouvert dans un lecteur PDF).
attachments:
  enabled: false
  allowed_senders: []
  #  - "backup@exemple.local"
  #  - "@exemple.local"          # tout le domaine
  allowed_extensions: [".txt", ".log", ".htm", ".html", ".pdf"]
  max_kb: 4096

# Clients — lie les postes/serveurs à un client pour le suivi par client
# (vue résumé, colonne et filtre Client dans le tableau). « machines » est une
# liste d'expressions régulières (insensibles à la casse) testées sur la
# machine extraite, le sujet et le nom de tâche de chaque courriel.
clients: []
#  - name: "Clinique Vertika"
#    machines: ["VERTIKA-.*", "SRV-VERT"]
#  - name: "Comptable Plus"
#    machines: ["SRV-COMPTA"]

# Tâches de sauvegarde attendues — permet de détecter les backups MANQUANTS
# (aucun courriel reçu dans la fenêtre attendue), pas seulement ceux en erreur.
# "match" est une expression régulière testée sur sujet + machine + tâche.
expected_jobs:
  - name: "SRV-FICHIERS — Image Macrium quotidienne"
    product: macrium
    match: "SRV-FICHIERS"
    every_hours: 24    # fréquence attendue
    grace_hours: 6     # tolérance avant de déclarer « manquant »
    # client: "Nom du client"   # optionnel — sinon déduit du dernier courriel
  - name: "Retrospect — Sauvegarde postes"
    product: retrospect
    match: "Sauvegarde postes"
    every_hours: 24
    grace_hours: 6

# Historique quotidien — le tableau ne montre que la fenêtre d'analyse
# (days_back) ; l'historique mémorise en plus le PIRE état de CHAQUE JOUR par
# tâche suivie (fichier local historique.json, écrit par la commande « run »
# seulement). Le tableau affiche alors une bande des derniers jours par tâche,
# le nombre de jours en échec et le taux de réussite sur 30 jours — les
# tâches en difficulté remontent en premier.
history:
  enabled: true
  keep_days: 90   # rétention du fichier (jours)
  show_days: 14   # jours affichés dans la bande du tableau

# Phase de rodage : tant que l'outil n'est pas déclaré « version finale »,
# l'autotest complet (36+ vérifications hors-ligne) tourne à CHAQUE
# utilisation et journalise son résultat dans autotest.log — une régression
# se voit dès la commande suivante. Coût : ~1 s par lancement.
# À la version finale : passer on_each_run à false.
autotest:
  on_each_run: true

# Notifications sortantes — désactivées par défaut. L'outil mémorise l'état
# de chaque tâche (dernier-etat.json) et ne notifie que sur TRANSITION vers
# un état surveillé (jamais à chaque cycle de 5 minutes). Le retour au succès
# d'une tâche en alerte est aussi signalé. Astuce : « suggest-jobs » puis des
# expected_jobs bien remplis donnent les notifications les plus fiables.
notifications:
  enabled: false
  # Canaux : "toast" = notification Windows native (aucune dépendance) ;
  # "webhook" = POST HTTP vers webhook_url — SEUL trafic réseau sortant de
  # l'outil, à activer en connaissance de cause (ex. ntfy auto-hébergé).
  methods: []            # ex. ["toast"] ou ["toast", "webhook"]
  webhook_url: ""
  webhook_format: "text"  # "text" = ntfy ; "json" = Teams/Slack ({"text": …})
  notify_on: ["erreur", "manquant"]   # états qui déclenchent une alerte
  notify_recovery: true   # notifier aussi le retour au succès

report:
  # Fichier HTML généré (relatif au dossier du projet, ou chemin absolu)
  output: "tableau-backups.html"
  # Auto-actualisation de la page dans le navigateur (secondes)
  refresh_seconds: 300
  # Nombre max de courriels listés dans le tableau détaillé
  max_rows: 100
  # Titre du tableau (en-tête et onglet du navigateur) — personnalisable
  # par site ou par entreprise
  title: "État des sauvegardes"

# Motifs de détection (expressions régulières) — NE RIEN METTRE ICI SAUF
# BESOIN : les motifs PAR DÉFAUT (visibles dans backup_monitor/parsers.py,
# maintenus et testés par l'autotest) couvrent Macrium, Retrospect — dont la
# nomenclature « ProActive - Remote - <Compagnie> - N erreurs » (client
# extrait du sujet, 0 erreurs = succès) —, SQL Server Agent, Proxmox Backup
# Server et les scripts à convention [Success]/[Failed].
#
# IMPORTANT : une liste fournie ici REMPLACE la liste par défaut de la même
# clé (elle ne s'y ajoute pas). Une ancienne section parsers copiée d'un
# exemple précédent peut donc masquer des correctifs — dans le doute, la
# supprimer et laisser les défauts s'appliquer. Ordre d'évaluation :
# erreur > avertissement > succès.
parsers: {}
# Exemple de personnalisation (décommenter et ajuster au besoin) :
# parsers:
#   macrium:
#     failure:
#       - "(?i)mon motif d'erreur à moi"
#     extract:
#       # groupe 1 = valeur extraite ; testé sur le sujet puis le corps
#       machine:
#         - "(?i)computer(?:\\s+name)?\\s*:?\\s+([A-Za-z0-9._-]+)"
#   retrospect:
#     extract:
#       client:
#         - "(?i)^proactive\\s*-\\s*remote\\s*-\\s*(.+?)\\s*-\\s*\\d+\\s*erreurs?\\s*$"
